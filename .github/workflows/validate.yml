name: Validate repository

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Compile Python sources
        run: python -m compileall -q scripts tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate configuration and generated files
        run: ./acme-containers validate --allow-missing-locks

      - name: Validate workflow YAML
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].each { |p| YAML.load_file(p); puts "Parsed #{p}" }'
