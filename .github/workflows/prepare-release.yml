name: Prepare release

on:
  workflow_dispatch:
    inputs:
      targets:
        description: all, core, dev, or comma-separated course targets
        required: true
        default: all
        type: string
      month:
        description: Optional release month in YYYY.MM form
        required: false
        type: string
      upgrade:
        description: Allow uv to upgrade packages within the declared bounds
        required: true
        default: false
        type: boolean

concurrency:
  group: prepare-release
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  compile-locks:
    name: Resolve locks (${{ matrix.lock_arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - lock_arch: amd64
            runner: ubuntu-24.04
          - lock_arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v7

      - name: Read tool versions
        id: config
        shell: bash
        run: |
          echo "uv_version=$(python -c 'import json; print(json.load(open("config/images.json"))["uv_version"])')" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ steps.config.outputs.uv_version }}
          enable-cache: true
          cache-dependency-glob: |
            requirements/**/*.in
            requirements/locks/**/*.txt
            config/images.json

      - name: Compile architecture locks
        shell: bash
        env:
          TARGETS: ${{ inputs.targets }}
          UPGRADE: ${{ inputs.upgrade }}
        run: |
          args=(locks "$TARGETS" --arch '${{ matrix.lock_arch }}')
          if [[ "$UPGRADE" == 'true' ]]; then
            args+=(--upgrade)
          fi
          ./acme-containers "${args[@]}"

      - name: Package architecture locks
        shell: bash
        run: |
          mkdir -p staged-locks
          while IFS= read -r -d '' file; do
            mkdir -p "staged-locks/$(dirname "$file")"
            cp "$file" "staged-locks/$file"
          done < <(find requirements/locks -type f \
            \( -name '${{ matrix.lock_arch }}.txt' -o -name 'direct-${{ matrix.lock_arch }}.txt' \) \
            -print0)
          tar -C staged-locks -czf 'locks-${{ matrix.lock_arch }}.tar.gz' requirements/locks

      - name: Upload architecture locks
        uses: actions/upload-artifact@v7
        with:
          name: locks-${{ matrix.lock_arch }}
          path: locks-${{ matrix.lock_arch }}.tar.gz
          if-no-files-found: error
          retention-days: 2

  finalize:
    name: Commit release and start publication
    runs-on: ubuntu-24.04
    needs: compile-locks

    steps:
      - uses: actions/checkout@v7

      - name: Download compiled locks
        uses: actions/download-artifact@v8
        with:
          pattern: locks-*
          path: artifacts
          merge-multiple: true

      - name: Merge lock artifacts
        run: |
          for archive in artifacts/locks-*.tar.gz; do
            tar -xzf "$archive" -C .
          done

      - name: Finalize versions and generated files
        shell: bash
        env:
          TARGETS: ${{ inputs.targets }}
          MONTH: ${{ inputs.month }}
        run: |
          args=(finalize-release "$TARGETS")
          if [[ -n "$MONTH" ]]; then
            args+=(--month "$MONTH")
          fi
          ./acme-containers "${args[@]}"
          ./acme-containers status

      - name: Run repository tests
        run: |
          python -m compileall -q scripts tests
          python -m unittest discover -s tests -v
          ./acme-containers validate

      - name: Commit prepared release
        id: commit
        shell: bash
        env:
          RELEASE_TARGETS: ${{ inputs.targets }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add config/images.json requirements/locks generated
          git commit -m "Prepare container release: $RELEASE_TARGETS"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Dispatch publication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TARGETS: ${{ inputs.targets }}
        run: |
          gh workflow run publish.yml \
            --repo '${{ github.repository }}' \
            --ref main \
            -f "targets=$RELEASE_TARGETS"
